<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bestseller — Dev Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,500;0,700;1,300;1,500;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/fonts.css">
  <link rel="stylesheet" href="../css/bestseller-page.css">
  <link rel="stylesheet" href="../css/bestseller-intro.css">
  <link rel="stylesheet" href="../css/bestseller-story.css">
  <link rel="stylesheet" href="../css/bestseller-quote.css">
  <link rel="stylesheet" href="../css/dev.css">
  <style>
    :root { --dev-bar-height: 36px; }
    html, body { margin: 0; padding: 0; }
  </style>
</head>
<body class="bestseller-horizontal-page">
  <div id="dev-nav"></div>
  <main id="dev-page" class="bestseller-page"></main>
  <script src="../scripts/bestseller-scroll.js"></script>
  <script src="dev-loader.js"></script>
  <script>
    DevLoader.load(['partials/dev-nav.html'], '#dev-nav').then(function () {
      return DevLoader.load([
        'partials/bestseller-intro.html',
        'partials/bestseller-story.html',
        'partials/bestseller-quote.html',
      ], '#dev-page');
    }).then(function () {
      if (window.IbmCognitiveBestsellerScroll) {
        window.IbmCognitiveBestsellerScroll.resetAndInit();
      }
    });
  </script>
</body>
