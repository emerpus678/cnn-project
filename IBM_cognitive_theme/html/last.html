<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goldcorp Last — Dev Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,500;0,700;1,300;1,500;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/fonts.css">
  <link rel="stylesheet" href="../css/last.css">
  <link rel="stylesheet" href="../css/dev.css">

<body class="goldcorp-last-preview">
  <div id="dev-nav"></div>
  <section class="goldcorp-last">
    <div class="goldcorp-last__layout">
      <div class="goldcorp-last__media">
        <div class="goldcorp-last__inner">
          <img class="goldcorp-last__photo" src="../assets/images/image%20copy.png" alt="Mining trucks in an open-pit gold mine" loading="lazy">
          <img class="goldcorp-last__overlay" src="../assets/svg/img4-lines.svg" alt="" aria-hidden="true">
        </div>
      </div>

      <blockquote class="goldcorp-last__quote">
        <span class="goldcorp-last__mark" aria-hidden="true">“</span>
        <p class="goldcorp-last__text">
          The potential to radically accelerate exploration target identification combined with significantly
          improved hit rates on economic monetization can drive a step-change in the pace of value growth in
          the industry.
        </p>
        <cite class="goldcorp-last__cite">— Todd White, Executive Vice President, Goldcorp</cite>
      </blockquote>
    </div>
  </section>
  <script src="../scripts/dev-loader.js"></script>
  <script>
    DevLoader.load(['partials/dev-nav.html'], '#dev-nav', { notify: false });
  </script>
