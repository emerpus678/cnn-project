<section class="hero-parallax" aria-label="Cognitive Enterprise hero imagery">
  <div class="hero-parallax__inner">
    <img class="hero-parallax__sky" src="../assets/images/hero/sky.jpg" alt="" aria-hidden="true">

    <div class="hero-parallax__overlays" aria-hidden="true">
      <div class="hero-parallax__mask hero-parallax__mask--wave hero-parallax__mask--left">
        <img class="hero-parallax__wave" src="../assets/svg/wave.svg" alt="" aria-hidden="true" decoding="async">
      </div>
      <div class="hero-parallax__mask hero-parallax__mask--wave hero-parallax__mask--right" data-scroll-mask>
        <img class="hero-parallax__wave" src="../assets/svg/wave.svg" alt="" aria-hidden="true" decoding="async">
      </div>

      <div class="hero-parallax__mask hero-parallax__mask--lines hero-parallax__mask--left">
        <img class="hero-parallax__lines" src="../assets/svg/lines.svg" alt="" aria-hidden="true" decoding="async">
      </div>
      <div class="hero-parallax__mask hero-parallax__mask--lines hero-parallax__mask--right" data-scroll-mask>
        <img class="hero-parallax__lines" src="../assets/svg/lines.svg" alt="" aria-hidden="true" decoding="async">
      </div>
    </div>

    <img class="hero-parallax__building" src="../assets/images/hero/building.png" alt="Modern glass skyscraper">
  </div>
</section>
