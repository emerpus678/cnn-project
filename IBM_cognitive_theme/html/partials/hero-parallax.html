<section class="hero-parallax" aria-label="Cognitive Enterprise hero imagery">
  <div class="hero-parallax__inner">
    <img class="hero-parallax__sky" src="../assets/images/hero/sky.jpg" alt="" aria-hidden="true">

    <div class="hero-parallax__overlays" aria-hidden="true">
      <div class="hero-parallax__mask hero-parallax__mask--wave">
        <img class="hero-parallax__wave" src="../assets/svg/wave.svg" alt="">
      </div>

      <div class="hero-parallax__mask hero-parallax__mask--lines">
        <img class="hero-parallax__lines" src="../assets/svg/lines.svg" alt="">
      </div>
    </div>

    <img class="hero-parallax__building" src="../assets/images/hero/building.png" alt="Modern glass skyscraper">
  </div>
</section>
